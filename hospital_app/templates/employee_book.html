{% extends "employee_base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Book an Appointment</h1>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('book') }}" method="POST">
        
        <!-- Step 1: Select Patient -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 600; color: #28a745; font-size: 1.1rem;">Step 1: Select Patient</label>
            <select name="patient_selection" class="form-control" required style="margin-top: 10px;">
                <option value="">-- Select Patient --</option>
                <option value="self">Self (Employee)</option>
                {% for dep in dependents %}
                <option value="{{ dep.dependent_id }}">{{ dep.dependent_name }} ({{ dep.relationship }})</option>
                {% endfor %}
            </select>
        </div>

        <!-- Step 2: Select Department -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 600; color: #28a745; font-size: 1.1rem;">Step 2: Select Department</label>
            <select name="department_id" id="department_id" class="form-control" required style="margin-top: 10px;">
                <option value="">-- Select Department --</option>
                {% for dept in departments %}
                <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Step 3: Select Doctor -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 600; color: #28a745; font-size: 1.1rem;">Step 3: Select Doctor</label>
            <select name="doctor_id" id="doctor_id" class="form-control" required style="margin-top: 10px;">
                <option value="">-- Select Department First --</option>
            </select>
            <small style="color: var(--text-muted);">This list is automatically filtered based on the selected department.</small>
        </div>

        <!-- Step 4: Select Date -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 600; color: #28a745; font-size: 1.1rem;">Step 4: Select Date</label>
            <input type="date" name="appointment_date" class="form-control" required style="margin-top: 10px;">
        </div>

        <!-- Step 5: Select Time Slot -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="font-weight: 600; color: #28a745; font-size: 1.1rem;">Step 5: Select Time Slot</label>
            <select name="appointment_time" class="form-control" required style="margin-top: 10px;">
                <option value="">-- Select Time Slot --</option>
                <option value="09:00 AM - 10:00 AM">09:00 AM - 10:00 AM</option>
                <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                <option value="12:00 PM - 01:00 PM">12:00 PM - 01:00 PM</option>
                <option value="02:00 PM - 03:00 PM">02:00 PM - 03:00 PM</option>
                <option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
                <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
            </select>
        </div>

        <div style="margin-top: 30px;">
            <button type="submit" class="btn-primary" style="width: 100%; background-color: #28a745; font-size: 1.1rem; padding: 15px;">Confirm Appointment</button>
        </div>

    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const deptSelect = document.getElementById('department_id');
        const docSelect = document.getElementById('doctor_id');

        deptSelect.addEventListener('change', function() {
            const deptId = this.value;
            
            // Clear current doctors
            docSelect.innerHTML = '<option value="">-- Loading Doctors... --</option>';
            
            if (!deptId) {
                docSelect.innerHTML = '<option value="">-- Select Department First --</option>';
                return;
            }

            // Fetch doctors for this department
            fetch(`/api/doctors/${deptId}`)
                .then(response => response.json())
                .then(data => {
                    docSelect.innerHTML = '<option value="">-- Select Doctor --</option>';
                    if (data.length === 0) {
                        docSelect.innerHTML = '<option value="">-- No doctors found in this department --</option>';
                        return;
                    }
                    data.forEach(doc => {
                        const option = document.createElement('option');
                        option.value = doc.id;
                        option.textContent = `${doc.name} (${doc.specialization})`;
                        docSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error fetching doctors:', error);
                    docSelect.innerHTML = '<option value="">-- Error loading doctors --</option>';
                });
        });
    });
</script>
{% endblock %}
