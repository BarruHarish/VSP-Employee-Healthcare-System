{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <h2>Admin Registration</h2>
    <p style="text-align: center; color: var(--secondary-color); margin-bottom: 1rem;">Setup the master administrator account.</p>
    <form action="{{ url_for('admin_register') }}" method="POST" class="form-container">
        <div class="form-group">
            <label for="username">Admin Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary btn-block">Register Admin</button>
    </form>
    <p class="auth-footer">Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
