{% extends "employee_base.html" %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Manage Profile</h1>
</div>

<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form action="{{ url_for('employee_profile') }}" method="POST" enctype="multipart/form-data" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        
        <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
            <div style="width: 150px; height: 150px; border-radius: 50%; overflow: hidden; background-color: #eee; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; border: 3px solid #28a745;">
                {% if employee.profile_photo %}
                    <img src="{{ url_for('static', filename=employee.profile_photo) }}" alt="Profile Photo" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                    <i class="fas fa-user" style="font-size: 4rem; color: #ccc;"></i>
                {% endif %}
            </div>
            <label style="font-weight: bold; cursor: pointer; color: #007bff;">
                <i class="fas fa-camera"></i> Change Profile Photo
                <input type="file" name="profile_photo" accept="image/*" style="display: none;">
            </label>
        </div>

        <div class="form-group">
            <label>Employee ID (Read Only)</label>
            <input type="text" name="employee_id" class="form-control" value="{{ employee.employee_id }}" readonly style="background-color: #e9ecef;">
        </div>
        
        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" name="employee_name" class="form-control" value="{{ employee.employee_name }}" required>
        </div>

        <div class="form-group">
            <label>Department (Steel Plant)</label>
            <select name="department" class="form-control">
                <option value="">Select Department</option>
                {% for dept in employee_departments %}
                <option value="{{ dept.name }}" {% if employee.department == dept.name %}selected{% endif %}>{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input type="text" name="designation" class="form-control" value="{{ employee.designation }}">
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" name="mobile" class="form-control" value="{{ employee.mobile }}" required pattern="[0-9]{10,15}" title="Please enter a valid mobile number (10-15 digits)">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ employee.email }}" required>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" class="form-control" value="{{ employee.dob }}">
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" class="form-control">
                <option value="">Select Gender</option>
                <option value="Male" {% if employee.gender == 'Male' %}selected{% endif %}>Male</option>
                <option value="Female" {% if employee.gender == 'Female' %}selected{% endif %}>Female</option>
                <option value="Other" {% if employee.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Blood Group</label>
            <input type="text" name="blood_group" class="form-control" value="{{ employee.blood_group }}">
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
            <label>Address</label>
            <textarea name="address" class="form-control" rows="3">{{ employee.address }}</textarea>
        </div>

        <div style="grid-column: 1 / -1; margin-top: 10px; display: flex; gap: 10px;">
            <button type="submit" class="btn-primary" style="flex: 1; padding: 12px; font-size: 1.1rem; background-color: #28a745;">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" class="btn-secondary" style="padding: 12px 20px; font-size: 1.1rem; background-color: #6c757d; color: white; text-align: center; text-decoration: none; border-radius: 4px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
